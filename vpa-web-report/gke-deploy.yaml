apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-web-report
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpa-web-report
  template:
    metadata:
      labels:
        app: vpa-web-report
    spec:
      containers:
      - name: vpa-web-report
        image: vpa-web-report:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vpa-web-report-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: vpa-web-report
